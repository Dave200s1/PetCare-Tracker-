name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Lint client
      - name: Client install
        run: npm ci
        working-directory: ./client

      - name: Client lint
        run: npm run lint
        working-directory: ./client

      # Lint server
      - name: Server install
        run: npm ci
        working-directory: ./server

      - name: Server lint
        run: npm run lint
        working-directory: ./server
