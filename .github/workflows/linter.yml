name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint client
        run: |
          cd petcare/client
          npm install
          npm run lint || true

      - name: Lint server
        run: |
          cd petcare/server
          npm install
          npm run lint || true
